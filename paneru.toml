# https://github.com/karinushka/paneru/blob/main/CONFIGURATION.md

[options]
focus_follows_mouse = false
preset_column_widths = [0.5, 0.75, 1]
auto_center = true

[padding]
top = 10
bottom = 10
left = 10
right = 10

[swipe]
sensitivity = 0.5

[swipe.gesture]
fingers_count = 3

[bindings]
window_focus_west = "cmd-h"
window_focus_east = "cmd-l"
window_swap_west = "cmd+shift-h"
window_swap_east = "cmd+shift-l"
window_virtual_north = "cmd-k"
window_virtual_south = "cmd-j"
window_virtualmove_north = "cmd+shift-k"
window_virtualmove_south = "cmd+shift-j"
window_resize = "cmd-e"
window_manage = "cmd-m"
